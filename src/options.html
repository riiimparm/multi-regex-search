<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Multi Regex Highlighter - オプション</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div id="app">
      <h1>ショートカットキー設定</h1>
      <p>
        ポップアップを呼び出すショートカットキーは、Chromeの拡張機能ショートカット設定画面から
        任意のキーに変更できます。
      </p>
      <p class="current">
        現在の割り当て: <strong id="current-shortcut">読み込み中...</strong>
      </p>
      <button id="open-shortcuts">ショートカット設定を開く</button>
    </div>
    <script src="options.js"></script>
  </body>
</html>
