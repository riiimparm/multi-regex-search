<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Multi Regex Highlighter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <p class="hint">1行に1つの正規表現を入力してください（最大30件）</p>
      <textarea id="patterns" placeholder="例:&#10;\d+&#10;[A-Z][a-z]+&#10;TODO"></textarea>
      <p id="warning" class="warning" hidden></p>
      <p id="unavailable" class="unavailable" hidden>このページでは利用できません</p>
      <ul id="results"></ul>
    </div>
    <script src="colors.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
